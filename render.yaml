# =================================================================
#  Blueprint de Render para Paska Agritech
#  Despliega la app como servicio web Docker.
#  La base de datos PostgreSQL se aloja en Neon (externa).
# =================================================================
services:
  - type: web
    name: paska-agritech
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      # Cadena de conexion de Neon. Se solicita en el panel de Render
      # (no se guarda en el repositorio).
      - key: DATABASE_URL
        sync: false
