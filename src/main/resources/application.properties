# ============================================================
#  Configuracion de la aplicacion Paska Agritech
# ============================================================
spring.application.name=Paska Agritech

# Render asigna el puerto por la variable de entorno PORT.
# En local usa 8080 si PORT no esta definido.
server.port=${PORT:8080}
server.address=0.0.0.0

# Thymeleaf (Vista del MVC)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ------------------------------------------------------------
#  Conexion a PostgreSQL (Neon) - gestionada por el Singleton.
#  Define estas variables de entorno (NO escribas claves aqui):
#    DATABASE_URL  -> cadena de conexion de Neon
#                     (postgresql://usuario:clave@host/bd?sslmode=require)
#  En local, si no defines DATABASE_URL, usa:
#    jdbc:postgresql://localhost:5432/PaskaAgritech_DB  (postgres/postgres)
# ------------------------------------------------------------
