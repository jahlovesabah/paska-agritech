# =================================================================
#  Blueprint de Render para Paska Agritech (servicio web Docker).
#  La base de datos PostgreSQL se aloja en Neon (externa).
# =================================================================
services:
  - type: web
    name: paska-agritech
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    healthCheckPath: /login
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: "true"
