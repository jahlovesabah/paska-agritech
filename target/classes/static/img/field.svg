<svg viewBox="0 0 480 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Campo agricola con sensores">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe8ff"/><stop offset="1" stop-color="#eaf6ff"/>
    </linearGradient>
    <linearGradient id="field2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#66bb6a"/><stop offset="1" stop-color="#2e7d32"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff59d"/><stop offset="1" stop-color="#ffca28"/>
    </radialGradient>
  </defs>

  <rect width="480" height="320" rx="20" fill="url(#sky)"/>
  <circle cx="390" cy="70" r="40" fill="url(#sun)"/>
  <g fill="#fff" opacity=".9">
    <ellipse cx="95" cy="60" rx="38" ry="17"/>
    <ellipse cx="130" cy="54" rx="28" ry="15"/>
    <ellipse cx="300" cy="45" rx="30" ry="13"/>
  </g>

  <!-- montanas -->
  <path d="M0 150 L70 95 L140 150 Z" fill="#b0bec5" opacity=".7"/>
  <path d="M110 150 L200 85 L290 150 Z" fill="#90a4ae" opacity=".7"/>

  <!-- colinas -->
  <path d="M0 165 Q120 120 250 165 T480 160 V320 H0 Z" fill="#81c784"/>
  <path d="M0 205 Q160 165 320 205 T480 200 V320 H0 Z" fill="url(#field2)"/>

  <!-- surcos -->
  <g stroke="#1b5e20" stroke-width="2" opacity=".3" fill="none">
    <path d="M15 235 H465"/><path d="M5 260 H475"/><path d="M0 288 H480"/>
  </g>

  <!-- cultivos -->
  <g>
    <g transform="translate(60,214)"><path d="M0 0 C-8 -18 -2 -30 0 -34 C2 -30 8 -18 0 0Z" fill="#43a047"/></g>
    <g transform="translate(100,222)"><path d="M0 0 C-8 -18 -2 -30 0 -34 C2 -30 8 -18 0 0Z" fill="#388e3c"/></g>
    <g transform="translate(140,214)"><path d="M0 0 C-8 -18 -2 -30 0 -34 C2 -30 8 -18 0 0Z" fill="#43a047"/></g>
    <g transform="translate(360,224)"><path d="M0 0 C-8 -18 -2 -30 0 -34 C2 -30 8 -18 0 0Z" fill="#388e3c"/></g>
    <g transform="translate(400,216)"><path d="M0 0 C-8 -18 -2 -30 0 -34 C2 -30 8 -18 0 0Z" fill="#43a047"/></g>
  </g>

  <!-- torre de sensor IoT -->
  <g transform="translate(250,140)">
    <rect x="-3" y="0" width="6" height="92" fill="#5d4037"/>
    <rect x="-20" y="-26" width="40" height="30" rx="5" fill="#37474f"/>
    <rect x="-14" y="-20" width="28" height="8" rx="2" fill="#80cbc4"/>
    <circle cx="0" cy="-6" r="4" fill="#26a69a"/>
    <line x1="0" y1="-26" x2="0" y2="-46" stroke="#37474f" stroke-width="3"/>
    <circle cx="0" cy="-48" r="3.5" fill="#e53935"/>
    <g stroke="#00897b" stroke-width="2.6" fill="none" opacity=".85">
      <path d="M12 -46 q11 11 0 26"/><path d="M18 -52 q19 19 0 40"/>
    </g>
  </g>

  <!-- gota / dato flotante -->
  <g transform="translate(150,120)">
    <path d="M0 0 C8 12 8 20 0 24 C-8 20 -8 12 0 0Z" fill="#4fc3f7" opacity=".9"/>
  </g>
</svg>
